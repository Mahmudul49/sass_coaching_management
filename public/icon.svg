<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EduPilot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12876F"/>
      <stop offset="1" stop-color="#0A5A4E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <g transform="translate(19.599999999999994, 31.599999999999994) scale(0.9)">
    <!-- flight arc (Pilot): marigold sweep from tassel up to the guiding star -->
    <path d="M334 300 C 398 300 430 250 430 176"
          fill="none" stroke="#E4890B" stroke-width="16" stroke-linecap="round"
          stroke-dasharray="2 30"/>
    <!-- mortarboard board (top diamond) -->
    <path d="M256 150 L410 208 L256 266 L102 208 Z" fill="#FFFFFF"/>
    <path d="M256 150 L410 208 L256 266 Z" fill="#EAF1EF"/>
    <!-- cap head / base -->
    <path d="M170 236 L170 300 C170 300 176 340 256 340 C336 340 342 300 342 300 L342 236 L256 274 Z"
          fill="#FFFFFF"/>
    <path d="M170 236 L256 274 L342 236 L342 262 L256 300 L170 262 Z" fill="#D7E4E1"/>
    <!-- tassel button on the board -->
    <circle cx="334" cy="230" r="12" fill="#E4890B"/>
    <path d="M334 240 L334 300" stroke="#E4890B" stroke-width="8" stroke-linecap="round"/>
    <!-- guiding navigator star (Pilot) -->
    <g transform="translate(430,176)">
      <path d="M0 -34 L9 -9 L34 0 L9 9 L0 34 L-9 9 L-34 0 L-9 -9 Z" fill="#F6B24A"/>
      <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
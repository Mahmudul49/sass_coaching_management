<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F7A6B" />
  <title>Offline — EduPilot</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
      font-family: 'Hind Siliguri', 'Noto Sans Bengali', system-ui, -apple-system, sans-serif;
      background: #F4F6F3; color: #12241F; text-align: center;
    }
    .card {
      max-width: 360px; width: 100%; background: #fff; border-radius: 18px;
      border: 1px solid rgba(18,36,31,0.08);
      box-shadow: 0 8px 30px -14px rgba(18,36,31,0.25);
      padding: 32px 24px;
    }
    .badge {
      width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0A5A4E, #0F7A6B);
    }
    .badge svg { width: 38px; height: 38px; }
    h1 { font-size: 1.3rem; margin: 0 0 8px; font-weight: 800; }
    p { margin: 0 0 20px; color: #5B6B66; line-height: 1.6; font-size: 0.98rem; }
    button {
      appearance: none; border: 0; cursor: pointer; width: 100%;
      background: #0F7A6B; color: #fff; font-weight: 700; font-size: 1rem;
      padding: 14px 20px; border-radius: 12px; font-family: inherit;
    }
    button:active { background: #0A5A4E; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>No internet connection</h1>
    <p>You're offline right now. EduPilot will reconnect automatically — or try again once your connection is back.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
  <script>
    // Auto-retry the moment the device comes back online.
    window.addEventListener("online", () => location.reload());
  </script>
</body>
</html>
